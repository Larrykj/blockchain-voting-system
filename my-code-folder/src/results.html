<script>
// Chart initialization for results visualization
function initializeResultsChart(candidates) {
    const ctx = document.getElementById('resultsChart').getContext('2d');
    
    // Extract candidate names and vote counts
    const labels = candidates.map(candidate => `${candidate.firstName} ${candidate.lastName}`);
    const data = candidates.map(candidate => candidate.voteCount);
    const backgroundColors = generateColors(candidates.length);
    
    // Create the chart
    window.resultsChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: backgroundColors,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: '#333'
                    }
                }
            }
        }
    });
    
    // Update voting statistics
    updateVotingStats(candidates);
}

// Generate random colors for chart
function generateColors(count) {
    const baseColors = [
        '#f82249', '#28a745', '#007bff', '#fd7e14', '#6f42c1', 
        '#20c997', '#17a2b8', '#dc3545', '#6c757d'
    ];
    
    // If we have more candidates than colors, generate more
    if (count <= baseColors.length) {
        return baseColors.slice(0, count);
    } else {
        const colors = [...baseColors];
        for (let i = baseColors.length; i < count; i++) {
            // Generate random hex color
            const color = '#' + Math.floor(Math.random()*16777215).toString(16);
            colors.push(color);
        }
        return colors;
    }
}

// Update voting statistics
function updateVotingStats(candidates) {
    const totalVotes = candidates.reduce((sum, candidate) => sum + parseInt(candidate.voteCount), 0);
    
    // Make an async call to get total voters (this will need to be implemented in app.js)
    if (typeof App !== 'undefined' && App.getTotalVoters) {
        App.getTotalVoters().then(totalVoters => {
            document.getElementById('totalVoters').textContent = totalVoters;
            document.getElementById('votesCast').textContent = totalVotes;
            
            // Calculate turnout
            if (totalVoters > 0) {
                const turnout = ((totalVotes / totalVoters) * 100).toFixed(1) + '%';
                document.getElementById('voterTurnout').textContent = turnout;
            } else {
                document.getElementById('voterTurnout').textContent = '0%';
            }
        }).catch(err => {
            console.error('Error getting total voters:', err);
            document.getElementById('totalVoters').textContent = 'Error';
        });
    } else {
        // Fallback if App.getTotalVoters is not available
        document.getElementById('totalVoters').textContent = 'N/A';
        document.getElementById('votesCast').textContent = totalVotes;
        document.getElementById('voterTurnout').textContent = 'N/A';
    }
}

// Hook into App.js to update chart when results are loaded
document.addEventListener('DOMContentLoaded', function() {
    // Create a MutationObserver to watch for changes in the results table
    const observer = new MutationObserver(function(mutations) {
        // If a new chart already exists, destroy it before creating a new one
        if (window.resultsChart) {
            window.resultsChart.destroy();
        }
        
        // If App.candidates is available, initialize chart
        if (typeof App !== 'undefined' && App.candidates && App.candidates.length > 0) {
            initializeResultsChart(App.candidates);
        }
    });
    
    // Start observing the results table for changes
    const targetNode = document.getElementById('candidatesResults');
    if (targetNode) {
        observer.observe(targetNode, { childList: true, subtree: true });
    }
    
    // Add a global event listener for when data is loaded
    window.addEventListener('resultsLoaded', function(e) {
        if (e.detail && e.detail.candidates) {
            initializeResultsChart(e.detail.candidates);
        }
    });
});
</script>
