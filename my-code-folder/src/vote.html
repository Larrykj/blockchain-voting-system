   Header
 ============================-->
<header id="header">
    <div class="container">

        <div id="logo" class="pull-left">
            <!-- Uncomment below if you prefer to use a text logo -->

            <ul class="nav-menu">
                <li class="reg" ><a href="index.html" >Register / Login</a></li>

            </ul>
        </nav><!-- #nav-menu-container -->

<!--==========================
  Intro Section
============================-->
<section id="intro">
    <div class="intro-container wow fadeIn">
        <h1 style="text-transform: initial" id="vote-text">Please<span> cast your vote</span></h1>
        <div id="election-status-container" style="margin-bottom: 20px; display: none;">
            <div class="alert alert-info" id="election-status" role="alert">
                Election Status: Not Started
            </div>
        </div>
        <div id="loader">
            <svg class="loader" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340">
                <circle cx="170" cy="170" r="160" stroke="#E2007C"/>
                <circle cx="170" cy="170" r="135" stroke="#404041"/>
                <circle cx="170" cy="170" r="110" stroke="#E2007C"/>
                <circle cx="170" cy="170" r="85" stroke="#404041"/>
            </svg>
        </div>
        <div id="content" style="display: none;">
            <div id="vote-container" class="container" style="background-color: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 10px; color: #333; margin-bottom: 20px; max-width: 800px;">
                <h3 class="text-center mb-4">Available Candidates</h3>
                <table class="table table-hover">
                    <thead class="thead-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Name</th>
                        <th scope="col">ID / Passport Number</th>
                        <th scope="col">Votes</th>
                    </tr>
                    </thead>
                    <tbody id="candidatesResults">
                    </tbody>
                </table>

                <form onSubmit="App.castVote(); return false;" class="mt-4">
                    <div class="form-group">
                        <label for="candidatesSelect" style="font-size: 18px; font-weight: bold;">Select Candidate</label>
                        <select class="form-control" id="candidatesSelect">
                        </select>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-vote">Cast Your Vote</button>
                    </div>
                </form>
            </div>
            <div id="voter-verification" style="background-color: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 10px; color: #333; margin-bottom: 20px; max-width: 800px; display: none;">
                <h4>Verify Your Identity</h4>
                <p>For security purposes, please verify your identity before voting.</p>
                <form id="verification-form" onSubmit="App.verifyVoter(); return false;">
                    <div class="form-group">
                        <label for="verify-id">Your ID Number</label>
                        <input type="text" class="form-control" id="verify-id" placeholder="Enter your ID number" required>
                    </div>
                    <button type="submit" class="btn" style="background-color: #f82249; color: white">Verify</button>
                </form>
            </div>
            <a class="about-btn scrollto" id="accountAddress" class="text-center"></a>
        </div>
    </div>
</section>
