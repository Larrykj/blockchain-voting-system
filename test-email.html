<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Test Email Functionality</h1>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" value="larrykings2002@gmail.com">
    </div>
    <div>
        <label for="code">MFA Code (will be generated):</label>
        <input type="text" id="code" value="123456" readonly>
    </div>
    <button id="sendTestEmail">Send Test Email</button>
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        document.getElementById('sendTestEmail').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Sending email...';
            
            fetch('http://localhost:3001/send-mfa', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, code })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<div style="color: green">Email sent successfully to ${email}!</div>`;
                } else {
                    resultDiv.innerHTML = `<div style="color: red">Error: ${data.message}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = `<div style="color: red">Error: ${error.message}</div>`;
            });
        });
    </script>
</body>
</html>
